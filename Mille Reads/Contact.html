<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mille Reads — she's got a book for every situation." />
  <title>Mille Reads</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <header class="header">
    <input type="checkbox" id="nav-toggle" class="nav-checkbox" />
    <nav class="nav">
      <label for="nav-toggle" class="nav-hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul class="nav-list">
        <li><a href="index.html"     class="nav-link">Home</a></li>
        <li><a href="About.html"     class="nav-link">About</a></li>
        <li><a href="Blog.html"  class="nav-link">Bookshelf</a></li>
        <li><a href="Contact.html"  class="nav-link">Connect</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ========== HERO ========== -->
    <section class="hero">
      <div class="hero-text">
        <h1 class="hero-title">Mille Reads</h1>
        <p class="hero-sub">she's got a book for every situation</p>
      </div>

         <!-- ========== CONTACT ========== -->
    <section class="contact" id="contact">
      <h2 class="contact-heading">Let's Get In Touch</h2>
      <p>brand collabs, questions, arcs or questions!</p>
      <form class="contact-form" action="mailto:camille.andelt@gmail.com" method="post">
        <input  type="text"  name="name"    placeholder="Your name:"    class="contact-input" required />
        <input  type="email" name="email"   placeholder="Your email:"   class="contact-input" required />
        <textarea            name="message" placeholder="Your message:" class="contact-textarea" rows="6" required></textarea>
        <button type="submit" class="contact-btn">Send</button>
      </form>
    </section>

  <!-- ========== FOOTER ========== -->
  <footer class="footer" id="follow">
    <h2 class="footer-heading">Follow me!</h2>
    <div class="footer-icons">
      <a href="https://youtube.com/@camilleandelt" target="_blank" rel="noopener" aria-label="YouTube">
        <img src="images/youtube 1.png"    alt="YouTube"    class="footer-icon" loading="lazy" />
      </a>
      <a href="https://www.instagram.com/mille_readss/" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="images/insta 1.png"      alt="Instagram"  class="footer-icon" loading="lazy" />
      </a>
      <a href="https://www.tiktok.com/@mille_reads" target="_blank" rel="noopener" aria-label="TikTok">
        <img src="images/tiktok 1.png"     alt="TikTok"     class="footer-icon" loading="lazy" />
      </a>
      <a href="https://app.thestorygraph.com/stats/millereads" target="_blank" rel="noopener" aria-label="StoryGraph">
        <img src="images/storygraph 1.png" alt="StoryGraph" class="footer-icon" loading="lazy" />
      </a>
    </div>
  </footer>

</body>
</html>
